name: Maintenance mensuelle Patoine Studio (reusable)

# Reusable workflow centralisé pour le rituel de maintenance mensuelle.
# Appelé par chaque repo client en gestion mensuelle via un workflow caller
# court qui passe les variables propres au client.
#
# Voir README.md de ce repo pour la procédure d'onboarding d'un nouveau client.
#
# Séquence du cycle :
#   1. Snapshot PageSpeed Insights mobile et desktop par page (multi-pages OK).
#   2. Push des métriques de performance dans la BDD Notion 📈 Performance par site web.
#   3. Audit des dépendances (npm / yarn / pnpm) pour les vulnérabilités.
#   4. Construction et envoi du rapport client structuré via Resend (3 sections :
#      Technique, Vitesse, Conseil du mois). En mode prod, BCC à PS.
#   5. Commit du snapshot perf dans le repo client.
#   6. Alerte interne PS si vulnérabilités critical/high détectées.
#   7. Alerte interne PS si workflow en échec (Issue GitHub + courriel Resend).

on:
  workflow_call:
    inputs:
      client_domain:
        description: "Domaine du client sans https://, ex. philemonproductions.ca"
        required: true
        type: string
      client_label:
        description: "Nom lisible du site, ex. Philémon Productions"
        required: true
        type: string
      client_first_name:
        description: "Prénom du contact principal côté client, utilisé dans la salutation personnalisée du rapport, ex. Philippe"
        required: true
        type: string
      client_email:
        description: "Adresse courriel du client où arrivent les vrais leads"
        required: true
        type: string
      site_url:
        description: "URL complète avec https://, ex. https://philemonproductions.ca"
        required: true
        type: string
      mode:
        description: "Mode (test = envoi seulement à PS, prod = envoi au client avec bcc PS)"
        required: false
        type: string
        default: prod
      ps_admin_email:
        description: "Boîte hub Patoine Studio destinataire des copies et alertes"
        required: false
        type: string
        default: web.admin@patoinestudio.ca
      ps_from:
        description: "Expéditeur Resend, format 'Nom <adresse>'"
        required: false
        type: string
        default: "Maintenance Patoine Studio <maintenance@patoinestudio.ca>"
      notion_conseils_database_id:
        description: "Database ID de la BDD Notion Conseils maintenance mensuelle PS"
        required: false
        type: string
        default: "a304778d7c664f20b546b88d31252d47"
      pages_to_test:
        description: "JSON array des chemins relatifs à tester avec PageSpeed Insights. Défaut ['/'] (home seulement). Pour multi-pages : '[\"/\", \"/articles\", \"/cours\"]'"
        required: false
        type: string
        default: '["/"]'
      notion_perf_database_id:
        description: "Database ID de la BDD Notion '📈 Performance par site web' (page Système). Laisser vide pour désactiver le push Notion."
        required: false
        type: string
        default: "ba305eef315c4ce9801922e30cd336b3"
      notion_client_page_id:
        description: "Page ID Notion du client dans la BDD '🗂️ Clients', utilisé pour la relation côté BDD Performance. Si absent, le push Notion est sauté."
        required: false
        type: string
        default: ""
    secrets:
      RESEND_API_KEY:
        description: "Clé Resend du domaine d'envoi PS"
        required: true
      PAGESPEED_API_KEY:
        description: "Clé Google Cloud avec API PageSpeed Insights activée"
        required: false
      NOTION_TOKEN:
        description: "Token Internal Integration Notion pour lire le catalogue Conseils maintenance mensuelle PS"
        required: false

jobs:
  premier-lundi:
    name: Vérifier que c'est bien le premier lundi du mois
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Déclenchement manuel, on lance la maintenance sans vérifier la date."
            echo "go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          jour=$((10#$(date -u +%d)))
          if [ "$jour" -le 7 ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  maintenance:
    name: Cycle mensuel
    needs: premier-lundi
    if: needs.premier-lundi.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Déterminer le mode, le mois et les destinataires
        id: mode
        env:
          CLIENT_DOMAIN: ${{ inputs.client_domain }}
          CLIENT_EMAIL: ${{ inputs.client_email }}
          PS_ADMIN_EMAIL: ${{ inputs.ps_admin_email }}
          MODE_IN: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mois_num=$(date -u +%m)
          annee=$(date -u +%Y)
          case "${mois_num}" in
            01) mois_fr="janvier" ;;
            02) mois_fr="février" ;;
            03) mois_fr="mars" ;;
            04) mois_fr="avril" ;;
            05) mois_fr="mai" ;;
            06) mois_fr="juin" ;;
            07) mois_fr="juillet" ;;
            08) mois_fr="août" ;;
            09) mois_fr="septembre" ;;
            10) mois_fr="octobre" ;;
            11) mois_fr="novembre" ;;
            12) mois_fr="décembre" ;;
            *) mois_fr="${mois_num}" ;;
          esac
          mois_label="${mois_fr} ${annee}"
          mois_courant=$(date -u +%Y-%m)

          # Calcul du mois précédent pour le delta perf
          if [ "${mois_num}" = "01" ]; then
            mois_prev_num=12
            annee_prev=$((annee - 1))
          else
            mois_prev_num=$(printf "%02d" $((10#$mois_num - 1)))
            annee_prev=$annee
          fi
          mois_prev="${annee_prev}-${mois_prev_num}"

          case "${mois_prev_num}" in
            01) mois_prev_fr="janvier" ;;
            02) mois_prev_fr="février" ;;
            03) mois_prev_fr="mars" ;;
            04) mois_prev_fr="avril" ;;
            05) mois_prev_fr="mai" ;;
            06) mois_prev_fr="juin" ;;
            07) mois_prev_fr="juillet" ;;
            08) mois_prev_fr="août" ;;
            09) mois_prev_fr="septembre" ;;
            10) mois_prev_fr="octobre" ;;
            11) mois_prev_fr="novembre" ;;
            12) mois_prev_fr="décembre" ;;
          esac

          # Trois modes possibles :
          #   - test    : sujet préfixé "Test live", bandeau jaune dans le HTML, to PS, bcc vide.
          #              Sert à valider la chaîne technique sans toucher au client.
          #   - preview : sujet identique à prod, HTML identique à prod (sans bandeau test),
          #              mais to redirigé vers PS et bcc vide. Sert à valider visuellement
          #              le rendu exact que verra le client, sans le déranger.
          #   - prod    : sujet client, HTML client, to client, bcc PS pour la copie.
          if [ "${MODE_IN}" = "test" ]; then
            echo "mode=test" >> "$GITHUB_OUTPUT"
            echo "to=${PS_ADMIN_EMAIL}" >> "$GITHUB_OUTPUT"
            echo "bcc=" >> "$GITHUB_OUTPUT"
            echo "subject=[Patoine Studio - Test live] ${CLIENT_DOMAIN} - Rapport mensuel ${mois_label}" >> "$GITHUB_OUTPUT"
          elif [ "${MODE_IN}" = "preview" ]; then
            echo "mode=preview" >> "$GITHUB_OUTPUT"
            echo "to=${PS_ADMIN_EMAIL}" >> "$GITHUB_OUTPUT"
            echo "bcc=" >> "$GITHUB_OUTPUT"
            echo "subject=[Patoine Studio - Maintenance] ${CLIENT_DOMAIN} - Rapport mensuel ${mois_label}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=prod" >> "$GITHUB_OUTPUT"
            echo "to=${CLIENT_EMAIL}" >> "$GITHUB_OUTPUT"
            echo "bcc=${PS_ADMIN_EMAIL}" >> "$GITHUB_OUTPUT"
            echo "subject=[Patoine Studio - Maintenance] ${CLIENT_DOMAIN} - Rapport mensuel ${mois_label}" >> "$GITHUB_OUTPUT"
          fi
          echo "mois_label=${mois_label}" >> "$GITHUB_OUTPUT"
          echo "mois_prev_fr=${mois_prev_fr}" >> "$GITHUB_OUTPUT"
          echo "mois_courant=${mois_courant}" >> "$GITHUB_OUTPUT"
          echo "mois_prev=${mois_prev}" >> "$GITHUB_OUTPUT"
          mois_num_int=$((10#${mois_num}))
          echo "mois_num_int=${mois_num_int}" >> "$GITHUB_OUTPUT"

      - name: Snapshot PageSpeed Insights (mobile et desktop, par page)
        id: pagespeed
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          SITE_URL: ${{ inputs.site_url }}
          PAGES_TO_TEST: ${{ inputs.pages_to_test }}
        run: |
          set -euo pipefail
          mois=$(date -u +%Y-%m)
          mkdir -p .maintenance/perf

          if [ -n "${PAGESPEED_API_KEY:-}" ]; then
            key_param="&key=${PAGESPEED_API_KEY}"
          else
            key_param=""
          fi

          # Index des métriques pour le push Notion subséquent, hors du repo (runner temp)
          index_file="${RUNNER_TEMP}/notion-perf-index.jsonl"
          : > "${index_file}"

          site_url_clean="${SITE_URL%/}"

          # Itère sur chaque page et chaque stratégie
          first=true
          score_mobile_first=""
          score_desktop_first=""
          score_mobile_pct_first=""
          score_desktop_pct_first=""

          while IFS= read -r page; do
            [ -z "${page}" ] && continue

            # Slug pour le nom de fichier snapshot (sans slashes)
            if [ "${page}" = "/" ]; then
              slug="home"
              url_test="${site_url_clean}/"
            else
              slug=$(echo "${page#/}" | sed 's|/|-|g')
              url_test="${site_url_clean}${page}"
            fi

            echo "::group::PageSpeed pour la page ${page} (slug=${slug})"

            for strategy in mobile desktop; do
              out=".maintenance/perf/${mois}-${slug}-${strategy}.json"
              if [ "${first}" = "false" ]; then sleep 5; fi
              first=false

              url="https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${url_test}&strategy=${strategy}&category=performance${key_param}"
              for attempt in 1 2 3; do
                http_status=$(curl -sS -o "${out}" -w "%{http_code}" "${url}" || echo "000")
                if [ "${http_status}" -ge 200 ] && [ "${http_status}" -lt 300 ]; then
                  break
                fi
                if [ "${attempt}" -lt 3 ]; then
                  sleep $((10 * attempt))
                else
                  echo "PageSpeed ${strategy} pour ${page} a échoué après 3 tentatives."
                  cat "${out}" || true
                  exit 1
                fi
              done

              if ! jq -e '.lighthouseResult.categories.performance.score' "${out}" > /dev/null; then
                echo "Snapshot ${strategy} pour ${page} invalide."
                cat "${out}"
                exit 1
              fi

              score=$(jq '.lighthouseResult.categories.performance.score' "${out}")
              score_pct=$(echo "${score} * 100 / 1" | bc -l | awk '{printf "%d", $1+0.5}')

              # Métriques Core Web Vitals (lab Lighthouse + CrUX field data pour INP)
              lcp=$(jq -r '.lighthouseResult.audits["largest-contentful-paint"].numericValue // empty' "${out}")
              cls=$(jq -r '.lighthouseResult.audits["cumulative-layout-shift"].numericValue // empty' "${out}")
              # INP vient du CrUX field data uniquement (pas mesurable en lab). Peut être absent si trafic Chrome insuffisant.
              inp=$(jq -r '.loadingExperience.metrics.INTERACTION_TO_NEXT_PAINT.percentile // empty' "${out}")
              if [ -z "${inp}" ]; then
                inp=$(jq -r '.originLoadingExperience.metrics.INTERACTION_TO_NEXT_PAINT.percentile // empty' "${out}")
              fi

              echo "  ${strategy} : score=${score_pct}/100 LCP=${lcp:-na}ms CLS=${cls:-na} INP=${inp:-na}ms"

              # Sauvegarder la première page (typiquement '/') pour le step delta qui qualifie la vitesse au client
              if [ -z "${score_mobile_first}" ] || [ -z "${score_desktop_first}" ]; then
                if [ "${strategy}" = "mobile" ] && [ -z "${score_mobile_first}" ]; then
                  score_mobile_first="${score}"
                  score_mobile_pct_first="${score_pct}"
                elif [ "${strategy}" = "desktop" ] && [ -z "${score_desktop_first}" ]; then
                  score_desktop_first="${score}"
                  score_desktop_pct_first="${score_pct}"
                fi
              fi

              # Ligne JSON pour l'index Notion (toutes les pages × stratégies seront poussées)
              jq -nc \
                --arg page "${page}" \
                --arg slug "${slug}" \
                --arg strategy "${strategy}" \
                --argjson score "${score}" \
                --arg lcp "${lcp}" \
                --arg cls "${cls}" \
                --arg inp "${inp}" \
                '{
                  page: $page,
                  slug: $slug,
                  strategy: $strategy,
                  score: $score,
                  lcp: (if $lcp == "" then null else ($lcp | tonumber) end),
                  cls: (if $cls == "" then null else ($cls | tonumber) end),
                  inp: (if $inp == "" then null else ($inp | tonumber) end)
                }' >> "${index_file}"
            done

            echo "::endgroup::"
          done < <(echo "${PAGES_TO_TEST}" | jq -r '.[]')

          # Exposer score_mobile et score_desktop de la première page pour le step delta (verdict client basé sur la home)
          echo "score_mobile=${score_mobile_first}" >> "$GITHUB_OUTPUT"
          echo "score_mobile_pct=${score_mobile_pct_first}" >> "$GITHUB_OUTPUT"
          echo "score_desktop=${score_desktop_first}" >> "$GITHUB_OUTPUT"
          echo "score_desktop_pct=${score_desktop_pct_first}" >> "$GITHUB_OUTPUT"
          echo "index_file=${index_file}" >> "$GITHUB_OUTPUT"

          # Bilan synthétique
          pages_count=$(echo "${PAGES_TO_TEST}" | jq 'length')
          snapshots_count=$(wc -l < "${index_file}")
          echo "Bilan PageSpeed : ${pages_count} page(s) × 2 stratégies = ${snapshots_count} snapshot(s)"

      - name: Pousser les métriques de performance dans la BDD Notion
        id: notion_perf
        if: always() && steps.pagespeed.outcome == 'success'
        continue-on-error: true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ inputs.notion_perf_database_id }}
          NOTION_CLIENT_PAGE_ID: ${{ inputs.notion_client_page_id }}
          CLIENT_DOMAIN: ${{ inputs.client_domain }}
          INDEX_FILE: ${{ steps.pagespeed.outputs.index_file }}
          MOIS_COURANT: ${{ steps.mode.outputs.mois_courant }}
          MAIL_MODE: ${{ steps.mode.outputs.mode }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e

          # Conditions de skip gracieux
          if [ -z "${NOTION_TOKEN:-}" ]; then
            echo "NOTION_TOKEN absent, push Notion sauté."
            exit 0
          fi
          if [ -z "${NOTION_DATABASE_ID:-}" ]; then
            echo "notion_perf_database_id absent, push Notion sauté."
            exit 0
          fi
          if [ -z "${NOTION_CLIENT_PAGE_ID:-}" ]; then
            echo "notion_client_page_id absent, push Notion sauté (le client n'est pas relié à la BDD Clients Notion)."
            exit 0
          fi
          if [ ! -s "${INDEX_FILE}" ]; then
            echo "Index Notion vide ou absent (${INDEX_FILE}), rien à pousser."
            exit 0
          fi

          date_iso="${MOIS_COURANT}-01"
          case "${MAIL_MODE}" in
            test) mode_label="Test" ;;
            preview) mode_label="Preview" ;;
            prod) mode_label="Prod" ;;
            *) mode_label="Prod" ;;
          esac

          pushed=0
          failed=0

          # Grouper l'index par page : chaque groupe contient les snapshots mobile + desktop
          # Note : on utilise process substitution < <(...) au lieu du pipe | while
          # pour que pushed et failed soient incrémentés dans le shell parent
          # (sinon le pipe lance le while dans un subshell et les compteurs sont perdus)
          while IFS= read -r page_group; do
            page=$(echo "${page_group}" | jq -r '.[0].page')

            # Extraire les snapshots mobile et desktop pour cette page
            mobile_json=$(echo "${page_group}" | jq -c '.[] | select(.strategy == "mobile")')
            desktop_json=$(echo "${page_group}" | jq -c '.[] | select(.strategy == "desktop")')

            # Fallback si une stratégie manque (cas dégénéré)
            if [ -z "${mobile_json}" ]; then mobile_json='{"score":null,"lcp":null,"cls":null,"inp":null}'; fi
            if [ -z "${desktop_json}" ]; then desktop_json='{"score":null,"lcp":null,"cls":null,"inp":null}'; fi

            score_mobile=$(echo "${mobile_json}" | jq -r '.score // "null"')
            score_desktop=$(echo "${desktop_json}" | jq -r '.score // "null"')

            snapshot_title="${MOIS_COURANT} ${CLIENT_DOMAIN} ${page}"

            # Construire les propriétés (colonnes de la BDD)
            properties=$(jq -nc \
              --arg title "${snapshot_title}" \
              --arg date "${date_iso}" \
              --arg client_id "${NOTION_CLIENT_PAGE_ID}" \
              --arg domain "${CLIENT_DOMAIN}" \
              --arg page "${page}" \
              --arg mode "${mode_label}" \
              --arg run_url "${RUN_URL}" \
              --arg score_m "${score_mobile}" \
              --arg score_d "${score_desktop}" \
              '{
                "Snapshot": {"title": [{"text": {"content": $title}}]},
                "Date": {"date": {"start": $date}},
                "Client": {"relation": [{"id": $client_id}]},
                "Domaine": {"rich_text": [{"text": {"content": $domain}}]},
                "Page": {"rich_text": [{"text": {"content": $page}}]},
                "Mode": {"select": {"name": $mode}},
                "Run URL": {"url": $run_url}
              }
              | (if $score_m != "null" and $score_m != "" then . + {"Score perf mobile": {"number": ($score_m | tonumber)}} else . end)
              | (if $score_d != "null" and $score_d != "" then . + {"Score perf desktop": {"number": ($score_d | tonumber)}} else . end)
              ')

            # Construire les blocks children (contenu de la page Notion)
            children=$(jq -nc \
              --argjson m "${mobile_json}" \
              --argjson d "${desktop_json}" \
              --arg run_url "${RUN_URL}" \
              '
              def label_score(s):
                if s == null then ""
                elif s >= 0.9 then " (excellent)"
                elif s >= 0.7 then " (solide)"
                elif s >= 0.5 then " (à surveiller)"
                else " (à améliorer)"
                end;
              def label_lcp(v):
                if v == null then ""
                elif v <= 2500 then " (excellent)"
                elif v <= 4000 then " (à surveiller)"
                else " (à améliorer)"
                end;
              def label_cls(v):
                if v == null then ""
                elif v == 0 then ""
                elif v <= 0.1 then " (excellent)"
                elif v <= 0.25 then " (à surveiller)"
                else " (à améliorer)"
                end;
              def label_inp(v):
                if v == null then ""
                elif v <= 200 then " (excellent)"
                elif v <= 500 then " (à surveiller)"
                else " (à améliorer)"
                end;
              def fmt_pct(s): if s == null then "non disponible" else "\((s * 100 + 0.5) | floor) %\(label_score(s))" end;
              def fmt_lcp(v): if v == null then "non disponible" else "\(v | floor) ms\(label_lcp(v))" end;
              def fmt_cls(v): if v == null then "non disponible" elif v == 0 then "0 (parfaitement stable)" else "\(v)\(label_cls(v))" end;
              def fmt_inp(v): if v == null then "non disponible (trafic Chrome insuffisant pour CrUX)" else "\(v | floor) ms\(label_inp(v))" end;
              def bullet(txt): {object: "block", type: "bulleted_list_item", bulleted_list_item: {rich_text: [{type: "text", text: {content: txt}}]}};
              def h2(txt): {object: "block", type: "heading_2", heading_2: {rich_text: [{type: "text", text: {content: txt}}]}};

              [
                h2("📱 Mobile"),
                bullet("Score performance : " + fmt_pct($m.score)),
                bullet("LCP (Largest Contentful Paint) : " + fmt_lcp($m.lcp)),
                bullet("CLS (Cumulative Layout Shift) : " + fmt_cls($m.cls)),
                bullet("INP (Interaction to Next Paint) : " + fmt_inp($m.inp)),

                h2("🖥️ Desktop"),
                bullet("Score performance : " + fmt_pct($d.score)),
                bullet("LCP (Largest Contentful Paint) : " + fmt_lcp($d.lcp)),
                bullet("CLS (Cumulative Layout Shift) : " + fmt_cls($d.cls)),
                bullet("INP (Interaction to Next Paint) : " + fmt_inp($d.inp)),

                {object: "block", type: "divider", divider: {}},

                {
                  object: "block",
                  type: "paragraph",
                  paragraph: {
                    rich_text: [
                      {type: "text", text: {content: "Source brute : snapshot Git dans .maintenance/perf/ du repo client. "}},
                      {type: "text", text: {content: "Voir le run GitHub", link: {url: $run_url}}}
                    ]
                  }
                }
              ]
              ')

            payload=$(jq -nc \
              --arg db "${NOTION_DATABASE_ID}" \
              --argjson props "${properties}" \
              --argjson children "${children}" \
              '{parent: {database_id: $db}, properties: $props, children: $children}')

            http_status=$(curl -sS -o notion-perf-response.json -w "%{http_code}" \
              -X POST "https://api.notion.com/v1/pages" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "${payload}")

            if [ "${http_status}" -ge 200 ] && [ "${http_status}" -lt 300 ]; then
              pushed=$((pushed + 1))
              echo "✓ Notion : ${snapshot_title}"
            else
              failed=$((failed + 1))
              echo "✗ Notion (HTTP ${http_status}) : ${snapshot_title}"
              head -c 500 notion-perf-response.json
              echo
            fi
          done < <(jq -sc 'group_by(.page) | .[]' "${INDEX_FILE}")

          echo "Bilan push Notion : ${pushed} réussis, ${failed} échoués."
          echo "pushed=${pushed}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed}" >> "$GITHUB_OUTPUT"

      - name: Composer la section Vitesse (qualification)
        id: delta
        env:
          SCORE_MOBILE: ${{ steps.pagespeed.outputs.score_mobile_pct }}
          SCORE_DESKTOP: ${{ steps.pagespeed.outputs.score_desktop_pct }}
        run: |
          set -euo pipefail

          # Qualification qualitative de la vitesse du mois courant, basée sur
          # la moyenne des deux scores mobile et desktop. Pas de chiffres bruts
          # exposés au client, pas de comparaison historique non plus, ce sera
          # réservé au rapport approfondi aux six mois qu'on construira plus
          # tard. Ici on reste très simple : un rappel que la maintenance a
          # eu lieu et que la vitesse a été regardée.
          score_avg=$(( (SCORE_MOBILE + SCORE_DESKTOP) / 2 ))
          echo "Score moyen mobile+desktop: ${score_avg}/100"

          if [ "${score_avg}" -ge 90 ]; then
            etat="très rapidement"
            verdict_court="excellente"
          elif [ "${score_avg}" -ge 80 ]; then
            etat="rapidement"
            verdict_court="solide"
          elif [ "${score_avg}" -ge 70 ]; then
            etat="à bonne vitesse"
            verdict_court="correcte"
          elif [ "${score_avg}" -ge 50 ]; then
            etat="à vitesse correcte, avec quelques pistes d'optimisation"
            verdict_court="à surveiller"
          else
            etat="à vitesse qui mérite une attention particulière ce mois-ci"
            verdict_court="à améliorer"
          fi

          # Composition de la section HTML, sobre, sans comparaison historique
          vitesse_html="<p>Ce mois-ci, ton site tourne <strong>${etat}</strong> sur les deux principaux contextes de visite, mobile et ordinateur.</p>"
          vitesse_html="${vitesse_html}<p>La vitesse d'un site, c'est l'un des leviers les plus directs sur l'expérience de tes visiteurs et sur ton classement dans Google. Un site qui charge en moins de deux secondes garde l'attention, un site qui traîne au-delà de trois secondes commence à perdre du monde.</p>"
          vitesse_html="${vitesse_html}<p style='font-size:13px;color:#666;margin-top:12px;'><em>Pour le détail des mesures et les recommandations techniques, je publie un rapport approfondi aux six mois. Tu peux aussi me demander une analyse ponctuelle à tout moment si tu veux creuser.</em></p>"

          {
            echo "vitesse_html<<VITESSE_HTML_EOF"
            echo "${vitesse_html}"
            echo "VITESSE_HTML_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "verdict_court=${verdict_court}" >> "$GITHUB_OUTPUT"

      - name: Audit des dépendances (npm/yarn/pnpm)
        id: deps_audit
        if: always()
        continue-on-error: true
        run: |
          set +e
          critical=0
          high=0
          moderate=0
          low=0
          total=0
          tool="aucun"
          audit_summary=""

          if [ -f package-lock.json ]; then
            tool="npm"
            npm audit --json > audit-report.json 2>/dev/null
            if [ -s audit-report.json ] && jq -e '.metadata.vulnerabilities' audit-report.json > /dev/null 2>&1; then
              critical=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-report.json)
              high=$(jq -r '.metadata.vulnerabilities.high // 0' audit-report.json)
              moderate=$(jq -r '.metadata.vulnerabilities.moderate // 0' audit-report.json)
              low=$(jq -r '.metadata.vulnerabilities.low // 0' audit-report.json)
              total=$(jq -r '.metadata.vulnerabilities.total // 0' audit-report.json)
            fi
          elif [ -f yarn.lock ]; then
            tool="yarn"
            yarn audit --json > audit-report.txt 2>/dev/null
            if [ -s audit-report.txt ]; then
              summary_line=$(grep '"type":"auditSummary"' audit-report.txt | tail -1)
              if [ -n "${summary_line}" ]; then
                critical=$(echo "${summary_line}" | jq -r '.data.vulnerabilities.critical // 0')
                high=$(echo "${summary_line}" | jq -r '.data.vulnerabilities.high // 0')
                moderate=$(echo "${summary_line}" | jq -r '.data.vulnerabilities.moderate // 0')
                low=$(echo "${summary_line}" | jq -r '.data.vulnerabilities.low // 0')
                total=$((critical + high + moderate + low))
              fi
            fi
          elif [ -f pnpm-lock.yaml ]; then
            tool="pnpm"
            npm install -g pnpm@latest --silent 2>/dev/null
            pnpm audit --json > audit-report.json 2>/dev/null
            if [ -s audit-report.json ] && jq -e '.metadata.vulnerabilities' audit-report.json > /dev/null 2>&1; then
              critical=$(jq -r '.metadata.vulnerabilities.critical // 0' audit-report.json)
              high=$(jq -r '.metadata.vulnerabilities.high // 0' audit-report.json)
              moderate=$(jq -r '.metadata.vulnerabilities.moderate // 0' audit-report.json)
              low=$(jq -r '.metadata.vulnerabilities.low // 0' audit-report.json)
              total=$((critical + high + moderate + low))
            fi
          else
            echo "Aucun lockfile détecté, audit sauté."
          fi

          echo "Outil: ${tool}, Critical: ${critical}, High: ${high}, Moderate: ${moderate}, Low: ${low}"
          echo "tool=${tool}" >> "$GITHUB_OUTPUT"
          echo "critical=${critical}" >> "$GITHUB_OUTPUT"
          echo "high=${high}" >> "$GITHUB_OUTPUT"
          echo "moderate=${moderate}" >> "$GITHUB_OUTPUT"
          echo "low=${low}" >> "$GITHUB_OUTPUT"
          echo "total=${total}" >> "$GITHUB_OUTPUT"

      - name: Récupérer le conseil du mois (Notion API)
        id: conseil
        if: always()
        continue-on-error: true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ inputs.notion_conseils_database_id }}
          MOIS_NUM: ${{ steps.mode.outputs.mois_num_int }}
        run: |
          set +e
          if [ -z "${NOTION_TOKEN:-}" ]; then
            echo "NOTION_TOKEN absent, fallback placeholder."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          response=$(curl -sS -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{\"filter\": {\"property\": \"Numéro\", \"number\": {\"equals\": ${MOIS_NUM}}}}")

          if ! echo "${response}" | jq -e '.results[0]' > /dev/null 2>&1; then
            echo "Réponse Notion invalide ou conseil manquant pour le mois ${MOIS_NUM}."
            echo "${response}" | head -c 500
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          hook=$(echo "${response}" | jq -r '.results[0].properties["Phrase d'"'"'accroche"].title[0].plain_text // empty')
          texte=$(echo "${response}" | jq -r '.results[0].properties["Texte du conseil"].rich_text[0].plain_text // empty')
          valeur=$(echo "${response}" | jq -r '.results[0].properties["Valeur Patoine Studio"].rich_text[0].plain_text // empty')
          theme=$(echo "${response}" | jq -r '.results[0].properties["Thème"].select.name // empty')

          if [ -z "${hook}" ] || [ -z "${texte}" ] || [ -z "${valeur}" ]; then
            echo "Champs manquants dans le conseil Notion."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Conseil récupéré : ${theme}"

          {
            echo "available=true"
            echo "theme=${theme}"
            echo "hook<<HOOK_EOF"
            echo "${hook}"
            echo "HOOK_EOF"
            echo "texte<<TEXTE_EOF"
            echo "${texte}"
            echo "TEXTE_EOF"
            echo "valeur<<VALEUR_EOF"
            echo "${valeur}"
            echo "VALEUR_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Construire et envoyer le rapport client (Resend)
        id: resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ steps.mode.outputs.to }}
          MAIL_BCC: ${{ steps.mode.outputs.bcc }}
          MAIL_SUBJECT: ${{ steps.mode.outputs.subject }}
          MAIL_MODE: ${{ steps.mode.outputs.mode }}
          PS_FROM: ${{ inputs.ps_from }}
          CLIENT_LABEL: ${{ inputs.client_label }}
          CLIENT_FIRST_NAME: ${{ inputs.client_first_name }}
          MOIS_LABEL: ${{ steps.mode.outputs.mois_label }}
          VITESSE_HTML: ${{ steps.delta.outputs.vitesse_html }}
          CONSEIL_AVAILABLE: ${{ steps.conseil.outputs.available }}
          CONSEIL_HOOK: ${{ steps.conseil.outputs.hook }}
          CONSEIL_TEXTE: ${{ steps.conseil.outputs.texte }}
          CONSEIL_VALEUR: ${{ steps.conseil.outputs.valeur }}
        run: |
          set -euo pipefail

          if [ -z "${RESEND_API_KEY:-}" ]; then
            echo "Erreur fatale, RESEND_API_KEY absent."
            exit 1
          fi

          # Construction du HTML structuré en quatre sections
          intro=""
          if [ "${MAIL_MODE}" = "test" ]; then
            intro="<p style='background:#fff3cd;padding:12px;border-radius:6px;color:#664d03;'><strong>Mode test live</strong> : ce courriel a été envoyé uniquement à la boîte hub Patoine Studio pour validation du workflow. Le client ne l'a pas reçu.</p>"
            salutation="<p>Test live du rapport mensuel ${CLIENT_LABEL}.</p>"
          else
            salutation="<p>Bonjour ${CLIENT_FIRST_NAME},</p><p>Petit mot pour la maintenance de ${MOIS_LABEL}.</p>"
          fi

          # Section 1, Technique (3 puces, surveillance continue mise en valeur)
          section_technique="<h3 style='margin-top:24px;color:#1a1a1a;'>Technique</h3><p>Deux éléments sont vérifiés en continu et chaque mois pour s'assurer que ton site fait son travail sans accroc :</p><ul style='padding-left:20px;'>"
          section_technique="${section_technique}<li style='margin-bottom:10px;'><strong>Disponibilité du site</strong> : surveillance active 24/7 qui confirme que ton site reste accessible aux visiteurs en tout temps. Aucun incident détecté ce mois-ci.</li>"
          section_technique="${section_technique}<li style='margin-bottom:10px;'><strong>Santé du formulaire de contact</strong> : sa configuration en arrière-plan est surveillée en continu pour s'assurer qu'il reste fonctionnel. En complément, j'ai exécuté ce matin un test complet de bout en bout (envoi réel d'un courriel à travers ton site) et tout passe correctement, tes leads aboutiraient bien dans ta boîte.</li>"
          section_technique="${section_technique}</ul>"

          # Section 2, Vitesse (HTML composé par le step delta, qualitatif)
          section_vitesse="<h3 style='margin-top:24px;color:#1a1a1a;'>Vitesse</h3>${VITESSE_HTML}"

          # Section Liens supprimée, intégrée dans Technique comme 3e puce

          # Section 4, Conseil du mois (lu depuis la BDD Notion Conseils maintenance mensuelle PS)
          if [ "${CONSEIL_AVAILABLE}" = "true" ]; then
            section_conseil="<h3 style='margin-top:24px;color:#1a1a1a;'>Conseil du mois</h3>"
            section_conseil="${section_conseil}<p style='font-weight:600;color:#1a1a1a;font-size:16px;'>${CONSEIL_HOOK}</p>"
            section_conseil="${section_conseil}<p>${CONSEIL_TEXTE}</p>"
            section_conseil="${section_conseil}<div style='margin-top:16px;padding:14px 16px;background:#f5f0e8;border-radius:6px;border-left:3px solid #1a1a1a;'>"
            section_conseil="${section_conseil}<p style='margin:0;'><strong>La valeur Patoine Studio</strong> : ${CONSEIL_VALEUR}</p>"
            section_conseil="${section_conseil}</div>"
          else
            section_conseil="<h3 style='margin-top:24px;color:#1a1a1a;'>Conseil du mois</h3><p><em>Le conseil du mois n'a pas pu être récupéré depuis le catalogue. Je regarde ça pour le prochain cycle.</em></p>"
          fi

          # Pied
          if [ "${MAIL_MODE}" = "test" ]; then
            pied="<p style='margin-top:32px;color:#666;font-size:13px;'>Test automatique du workflow réutilisable, mode test.</p>"
          else
            pied="<p style='margin-top:32px;'>Si tu remarques quoi que ce soit ou si tu veux des ajustements, écris-moi.</p><p>Charles, Patoine Studio</p>"
          fi

          html="<div style='font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.5;color:#1a1a1a;max-width:600px;'>${intro}${salutation}${section_technique}${section_vitesse}${section_conseil}${pied}</div>"

          payload=$(jq -n \
            --arg from "${PS_FROM}" \
            --arg to "${MAIL_TO}" \
            --arg subject "${MAIL_SUBJECT}" \
            --arg html "${html}" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          if [ -n "${MAIL_BCC}" ]; then
            payload=$(echo "$payload" | jq --arg bcc "${MAIL_BCC}" '. + {bcc: [$bcc]}')
          fi

          http_status=$(curl -s -o resend-response.json -w "%{http_code}" \
            -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}")

          echo "HTTP Resend: ${http_status}"
          cat resend-response.json
          echo

          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 300 ]; then
            echo "Échec d'envoi Resend."
            exit 1
          fi

          message_id=$(jq -r '.id // empty' resend-response.json)
          echo "message_id=${message_id}" >> "$GITHUB_OUTPUT"

      - name: Commit du snapshot perf
        if: success()
        run: |
          set -euo pipefail
          git config user.name "Maintenance bot Patoine Studio"
          git config user.email "maintenance@patoinestudio.ca"
          git add .maintenance/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter."
            exit 0
          fi
          mois=$(date -u +%Y-%m)
          git commit -m "chore(maintenance): snapshot perf ${mois}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Alerte interne, vulnérabilités critical ou high
        if: always() && (steps.deps_audit.outputs.critical != '' && steps.deps_audit.outputs.critical != '0') || (steps.deps_audit.outputs.high != '' && steps.deps_audit.outputs.high != '0')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PS_ADMIN_EMAIL: ${{ inputs.ps_admin_email }}
          PS_FROM: ${{ inputs.ps_from }}
          CLIENT_DOMAIN: ${{ inputs.client_domain }}
          CLIENT_LABEL: ${{ inputs.client_label }}
          CLIENT_FIRST_NAME: ${{ inputs.client_first_name }}
          TOOL: ${{ steps.deps_audit.outputs.tool }}
          CRITICAL: ${{ steps.deps_audit.outputs.critical }}
          HIGH: ${{ steps.deps_audit.outputs.high }}
          MODERATE: ${{ steps.deps_audit.outputs.moderate }}
          LOW: ${{ steps.deps_audit.outputs.low }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          html="<p>Alerte interne Patoine Studio.</p><p>Vulnérabilités détectées dans les dépendances de <strong>${CLIENT_LABEL}</strong> (${CLIENT_DOMAIN}) lors de l'audit ${TOOL}.</p><ul><li>Critical : <strong>${CRITICAL}</strong></li><li>High : <strong>${HIGH}</strong></li><li>Moderate : ${MODERATE}</li><li>Low : ${LOW}</li></ul><p>Les vulnérabilités critical et high méritent une attention rapide. Les moderate et low peuvent attendre le prochain cycle.</p><p><a href='${RUN_URL}'>Voir le run complet pour le détail</a></p>"

          payload=$(jq -n \
            --arg from "${PS_FROM}" \
            --arg to "${PS_ADMIN_EMAIL}" \
            --arg subject "[Patoine Studio - ALERTE] ${CLIENT_DOMAIN} - vulnérabilités dépendances (${CRITICAL} critical, ${HIGH} high)" \
            --arg html "${html}" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${payload}" | jq '.' || true

      - name: Alerte interne, échec du workflow
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PS_ADMIN_EMAIL: ${{ inputs.ps_admin_email }}
          PS_FROM: ${{ inputs.ps_from }}
          CLIENT_DOMAIN: ${{ inputs.client_domain }}
          CLIENT_LABEL: ${{ inputs.client_label }}
          CLIENT_FIRST_NAME: ${{ inputs.client_first_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          mois=$(date -u +%Y-%m)
          subject="[Patoine Studio - ALERTE] ${CLIENT_DOMAIN} - échec du workflow maintenance mensuelle"
          html="<p>Alerte interne Patoine Studio.</p><p>Le workflow de maintenance mensuelle pour <strong>${CLIENT_LABEL}</strong> (${CLIENT_DOMAIN}) a échoué.</p><p><a href='${RUN_URL}'>Voir les détails du run</a></p><p>Le client n'a probablement pas reçu son rapport mensuel. Investiguer et re-déclencher manuellement si besoin via workflow_dispatch.</p>"

          # 1. Courriel Resend (best-effort)
          payload=$(jq -n \
            --arg from "${PS_FROM}" \
            --arg to "${PS_ADMIN_EMAIL}" \
            --arg subject "${subject}" \
            --arg html "${html}" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          http_status=$(curl -s -o resend-alert.json -w "%{http_code}" \
            -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY:-}" \
            -H "Content-Type: application/json" \
            -d "${payload}")
          echo "Resend alert HTTP: ${http_status}"

          # 2. Issue GitHub (canal de secours fiable)
          issue_body=""
          issue_body+="Échec automatique détecté lors du run de maintenance mensuelle ${mois}.\n\n"
          issue_body+="- **Client** : ${CLIENT_LABEL} (${CLIENT_DOMAIN})\n"
          issue_body+="- **Date** : $(date -u +'%Y-%m-%d %H:%M UTC')\n"
          issue_body+="- **Run** : ${RUN_URL}\n\n"
          issue_body+="### Étapes à suivre\n\n"
          issue_body+="1. Consulter le run pour identifier la cause.\n"
          issue_body+="2. Corriger la cause (régénérer une clé, fixer un bug, etc.).\n"
          issue_body+="3. Re-déclencher via workflow_dispatch en mode test pour valider.\n"
          issue_body+="4. Re-déclencher en mode prod si le rapport client n'est pas parti.\n"
          issue_body+="5. Fermer cette issue.\n\n"
          issue_body+="Cette issue a été créée automatiquement.\n"
          issue_body+="Un courriel Resend a aussi été tenté (HTTP ${http_status}).\n"
          issue_body=$(printf '%b' "${issue_body}")

          gh issue create \
            --repo "${REPO}" \
            --title "Échec workflow maintenance mensuelle - ${mois}" \
            --body "${issue_body}" \
            --label "maintenance,alerte" 2>&1 || echo "Création d'issue échouée, à investiguer."

      - name: Récapitulatif du cycle
        if: always()
        env:
          SITE_URL: ${{ inputs.site_url }}
        run: |
          set -euo pipefail
          mois=$(date -u +%Y-%m)
          {
            echo "### Cycle maintenance ${mois}"
            echo ""
            echo "- Client : ${{ inputs.client_label }} (${{ inputs.client_domain }})"
            echo "- Mode : ${{ steps.mode.outputs.mode }}"
            echo "- Destinataire : ${{ steps.mode.outputs.to }}"
            echo "- Bcc : ${{ steps.mode.outputs.bcc }}"
            echo "- Site : ${SITE_URL}"
            echo ""
            echo "**Résultats**"
            echo ""
            echo "- Score perf mobile : ${{ steps.pagespeed.outputs.score_mobile_pct || 'N/A' }}/100"
            echo "- Score perf desktop : ${{ steps.pagespeed.outputs.score_desktop_pct || 'N/A' }}/100"
            echo "- Verdict vitesse client : ${{ steps.delta.outputs.verdict_court || 'N/A' }}"
            echo "- Liens vérifiés : ${{ steps.liens.outputs.total || 'N/A' }}"
            echo "- Liens brisés : ${{ steps.liens.outputs.broken_count || 'N/A' }}"
            echo "- Vulnérabilités (${{ steps.deps_audit.outputs.tool || 'N/A' }}) : ${{ steps.deps_audit.outputs.critical || 0 }} critical, ${{ steps.deps_audit.outputs.high || 0 }} high, ${{ steps.deps_audit.outputs.moderate || 0 }} moderate, ${{ steps.deps_audit.outputs.low || 0 }} low"
          } >> "$GITHUB_STEP_SUMMARY"
